name: 株式投資ラジオ 毎朝自動生成

on:
  schedule:
    - cron: "5 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: ラジオ生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_radio.py

      - name: GitHub Pages用に音声をコピー
        run: |
          mkdir -p docs/audio
          for f in 音声/*.mp3; do
            if [ -f "$f" ]; then
              cp "$f" "docs/audio/$(basename "$f")"
            fi
          done

      - name: 生成ファイルをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "📻 株式投資ラジオ $(date +%Y-%m-%d) 生成"
          git push

      - name: GitHub Pages デプロイ待ち
        run: sleep 30

      - name: LINE送信
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python send_line.py
