name: 株式投資ラジオ 毎朝自動生成

on:
  schedule:
    # 毎朝 7:05 JST（= 22:05 UTC 前日）AIニュースの5分後
    - cron: "5 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: ラジオ生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_radio.py

      # 音声をASCIIファイル名でdocs/にコピー
      - name: GitHub Pages用に音声をコピー
        run: |
          mkdir -p docs/audio
          # 最新の音声ファイルをコピー
          for f in 音声/*.mp3; do
            if [ -f "$f" ]; then
              basename=$(basename "$f")
              cp "$f" "docs/audio/$basename"
            fi
          done

      - name: 生成ファイルをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "📻 株式投資ラジオ $(date +%Y-%m-%d) 生成"
          git push

      - name: GitHub Pages デプロイ待ち
        run: sleep 30

      # LINE送信
      - name: LINE送信
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          REPO_OWNER=$(echo $GITHUB_REPOSITORY | cut -d'/' -f1)
          REPO_NAME=$(echo $GITHUB_REPOSITORY | cut -d'/' -f2)
          TODAY=$(date +%Y-%m-%d)

          # 最新の音声ファイルを検索
          AUDIO_FILE=$(ls -t docs/audio/Day*.mp3 2>/dev/null | head -1)

          if [ -n "$AUDIO_FILE" ]; then
            BASENAME=$(basename "$AUDIO_FILE")
            SIZE=$(stat -c%s "$AUDIO_FILE")
            DURATION=$(( SIZE * 8 / 32000 * 1000 ))
            AUDIO_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/audio/${BASENAME}"

            # 音声URLの有効性確認（リトライ付き）
            for i in 1 2 3; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$AUDIO_URL")
              if [ "$STATUS" = "200" ]; then
                echo "音声URL確認OK"
                break
              fi
              echo "Pages未デプロイ (${STATUS})、30秒待機... (${i}/3)"
              sleep 30
            done

            # progress.jsonからDay番号を取得
            DAY=$(python3 -c "import json; p=json.load(open('カリキュラム/progress.json')); print(p.get('last_completed_day', '?'))")
            TITLE=$(python3 -c "
import json
c=json.load(open('カリキュラム/curriculum.json'))
for ph in c['phases']:
  for l in ph['lessons']:
    if l['day']==${DAY}: print(l['title']); break
")

            RESULT=$(curl -s -X POST https://api.line.me/v2/bot/message/push \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
              -d "{
                \"to\": \"${LINE_USER_ID}\",
                \"messages\": [
                  {
                    \"type\": \"text\",
                    \"text\": \"📻 株式投資ラジオ Day ${DAY}/90\n\n📖 ${TITLE}\n\n▶ 下の音声を再生してください\"
                  },
                  {
                    \"type\": \"audio\",
                    \"originalContentUrl\": \"${AUDIO_URL}\",
                    \"duration\": ${DURATION}
                  }
                ]
              }")
            echo "LINE送信結果: $RESULT"

            # 失敗時テキストのみ
            if echo "$RESULT" | grep -q "error\|Failed"; then
              curl -s -X POST https://api.line.me/v2/bot/message/push \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
                -d "{
                  \"to\": \"${LINE_USER_ID}\",
                  \"messages\": [
                    {
                      \"type\": \"text\",
                      \"text\": \"📻 株式投資ラジオ Day ${DAY}/90\n\n📖 ${TITLE}\n\n🎧 音声: ${AUDIO_URL}\"
                    }
                  ]
                }"
            fi
          fi
